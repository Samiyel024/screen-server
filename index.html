<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>System Care | Device Management Console</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --bg-body: #f8fafc;
            --bg-card: #ffffff;
            --text-main: #334155;
            --text-muted: #64748b;
            --border-color: #e2e8f0;
            --primary: #2563eb;
            --primary-hover: #1d4ed8;
            --success: #10b981;
            --danger: #ef4444;
            --radius: 12px;
            --shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background-color: var(--bg-body); color: var(--text-main); font-family: 'Inter', sans-serif; display: flex; flex-direction: column; height: 100vh; overflow: hidden; }

        header { display: flex; justify-content: space-between; align-items: center; padding: 16px 32px; background-color: var(--bg-card); border-bottom: 1px solid var(--border-color); z-index: 10; }
        .brand { font-size: 20px; font-weight: 700; color: #0f172a; display: flex; align-items: center; gap: 10px; }
        .brand i { color: var(--primary); font-size: 24px; }

        .status-container { display: flex; align-items: center; gap: 16px; font-size: 14px; font-weight: 500; padding: 8px 16px; background: #f1f5f9; border-radius: 30px; border: 1px solid var(--border-color); }
        .dot { width: 10px; height: 10px; border-radius: 50%; background-color: var(--danger); transition: all 0.3s ease; }
        .dot.connected { background-color: var(--success); box-shadow: 0 0 8px rgba(16, 185, 129, 0.4); }

        .main-container { display: flex; flex: 1; padding: 24px; gap: 24px; max-width: 1600px; margin: 0 auto; width: 100%; }

        .screen-wrapper { flex: 3; background-color: var(--bg-card); border-radius: var(--radius); border: 1px solid var(--border-color); box-shadow: var(--shadow); display: flex; flex-direction: column; overflow: hidden; }
        .video-header { padding: 16px 24px; border-bottom: 1px solid var(--border-color); font-weight: 600; color: #0f172a; }
        .video-container { flex: 1; display: flex; justify-content: center; align-items: center; background-color: #e2e8f0; background-image: radial-gradient(#cbd5e1 1px, transparent 0); background-size: 20px 20px; position: relative; overflow: hidden; }
        
        /* 🔥 WebRTC Video Tag */
        #remoteVideo { max-width: 100%; max-height: 100%; object-fit: contain; display: none; background: #000; }

        .waiting-text { display: flex; flex-direction: column; align-items: center; gap: 12px; color: var(--text-muted); font-size: 16px; font-weight: 500; }
        .waiting-text i { font-size: 32px; color: #94a3b8; }

        .controls { padding: 20px 24px; background-color: var(--bg-card); border-top: 1px solid var(--border-color); display: flex; justify-content: center; gap: 16px; }
        .btn { padding: 10px 20px; border-radius: 8px; font-family: 'Inter', sans-serif; font-size: 14px; font-weight: 600; cursor: pointer; display: flex; align-items: center; gap: 8px; border: 1px solid transparent; }
        .btn-primary { background-color: var(--primary); color: white; }
        .btn-danger { background-color: white; color: var(--danger); border-color: var(--danger); }
        .btn-secondary { background-color: white; color: var(--text-main); border-color: var(--border-color); }

        .sidebar { flex: 1; min-width: 320px; display: flex; flex-direction: column; gap: 24px; }
        .panel { background-color: var(--bg-card); border-radius: var(--radius); border: 1px solid var(--border-color); box-shadow: var(--shadow); display: flex; flex-direction: column; overflow: hidden; }
        .panel-header { padding: 16px 20px; border-bottom: 1px solid var(--border-color); font-weight: 600; color: #0f172a; background-color: #f8fafc; }
        .panel-body { padding: 20px; flex: 1; display: flex; flex-direction: column; gap: 15px;}
        
        .config-group label { display: block; margin-bottom: 8px; color: var(--text-main); font-size: 13px; font-weight: 500; }
        .config-group input { width: 100%; background: #ffffff; border: 1px solid #cbd5e1; padding: 10px 14px; border-radius: 8px; font-size: 14px; outline: none; }
        .config-group input:focus { border-color: var(--primary); box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.1); }

        .log-container { flex: 1; overflow-y: auto; max-height: 400px; display: flex; flex-direction: column; gap: 12px; }
        .log-entry { display: flex; gap: 12px; font-size: 13px; padding: 10px 12px; background: #f8fafc; border-radius: 6px; border-left: 3px solid #cbd5e1; }
        .log-entry.info { border-left-color: var(--primary); }
        .log-entry.warn { border-left-color: #f59e0b; background: #fffbeb; }
        .log-entry.error { border-left-color: var(--danger); background: #fef2f2; color: #991b1b; }
        .log-time { color: var(--text-muted); font-weight: 500; font-size: 12px; white-space: nowrap; }
        .log-message { flex: 1; word-wrap: break-word; }
    </style>
</head>
<body>

    <header>
        <div class="brand">
            <i class="fa-solid fa-shield-halved"></i> Device Management Console
        </div>
        <div class="status-container">
            <span>WebRTC Stream</span>
            <div class="status-indicator">
                <div class="dot" id="statusDot"></div>
                <span id="statusText" style="color: var(--text-muted);">Disconnected</span>
            </div>
        </div>
    </header>

    <div class="main-container">
        <div class="screen-wrapper">
            <div class="video-header"><span><i class="fa-solid fa-display" style="margin-right: 8px;"></i> Display Mirroring</span></div>
            <div class="video-container" id="videoContainer">
                <div class="waiting-text" id="waitingText">
                    <i class="fa-solid fa-satellite-dish"></i> Awaiting WebRTC Connection...
                </div>
                <video id="remoteVideo" autoplay playsinline></video>
            </div>
            <div class="controls">
                <button class="btn btn-primary" id="btnConnect" onclick="toggleConnection()">
                    <i class="fa-solid fa-link"></i> Connect Target
                </button>
                <button class="btn btn-secondary" onclick="toggleFullscreen()">
                    <i class="fa-solid fa-expand"></i> Fullscreen
                </button>
                <button class="btn btn-danger" id="btnStop" onclick="stopScreen()" style="display: none;">
                    <i class="fa-regular fa-circle-stop"></i> Stop Stream
                </button>
            </div>
        </div>

        <div class="sidebar">
            <div class="panel">
                <div class="panel-header">Connection Settings</div>
                <div class="panel-body">
                    <div class="config-group">
                        <label>Target Device ID (Room ID)</label>
                        <input type="text" id="targetId" placeholder="Enter Android ID / Room ID" value="">
                    </div>
                    <div class="config-group">
                        <label>Signaling Server (WSS URL)</label>
                        <input type="text" id="wsUrl" value="wss://live-screen-server.onrender.com" placeholder="wss://...">
                    </div>
                </div>
            </div>

            <div class="panel" style="flex: 1;">
                <div class="panel-header" style="display: flex; justify-content: space-between; align-items: center;">
                    <span>Event Logs</span>
                    <button onclick="clearLogs()" style="background: none; border: none; color: var(--text-muted); cursor: pointer; font-size: 14px;">
                        <i class="fa-solid fa-eraser"></i> Clear
                    </button>
                </div>
                <div class="panel-body">
                    <div class="log-container" id="terminal"></div>
                </div>
            </div>
        </div>
    </div>

    <script>
        let ws = null;
        let pc = null; // Peer Connection for WebRTC
        let isConnected = false;
        
        const terminal = document.getElementById('terminal');
        const remoteVideo = document.getElementById('remoteVideo');
        const waitingText = document.getElementById('waitingText');
        const statusDot = document.getElementById('statusDot');
        const statusText = document.getElementById('statusText');
        const btnConnect = document.getElementById('btnConnect');
        const btnStop = document.getElementById('btnStop');

        function log(message, type = 'info') {
            const now = new Date();
            const timeStr = now.getHours().toString().padStart(2, '0') + ':' + now.getMinutes().toString().padStart(2, '0') + ':' + now.getSeconds().toString().padStart(2, '0');
            const div = document.createElement('div');
            div.className = `log-entry ${type}`;
            div.innerHTML = `<div class="log-time">${timeStr}</div><div class="log-message">${message}</div>`;
            terminal.appendChild(div);
            terminal.scrollTop = terminal.scrollHeight;
        }

        function clearLogs() { terminal.innerHTML = ''; }

        function updateStatus(connected) {
            isConnected = connected;
            if (connected) {
                statusDot.classList.add('connected');
                statusText.innerText = 'Connected to Signaling';
                statusText.style.color = 'var(--success)';
                btnConnect.innerHTML = '<i class="fa-solid fa-unlink"></i> Disconnect';
                btnConnect.classList.replace('btn-primary', 'btn-danger');
                btnStop.style.display = 'flex';
            } else {
                statusDot.classList.remove('connected');
                statusText.innerText = 'Disconnected';
                statusText.style.color = 'var(--text-muted)';
                btnConnect.innerHTML = '<i class="fa-solid fa-link"></i> Connect Target';
                btnConnect.classList.replace('btn-danger', 'btn-primary');
                btnStop.style.display = 'none';
                
                remoteVideo.style.display = 'none';
                remoteVideo.srcObject = null;
                waitingText.style.display = 'flex';
                
                if (pc) { pc.close(); pc = null; }
            }
        }

        function toggleConnection() {
            if (isConnected) {
                if (ws) ws.close();
            } else {
                connectWebSocket();
            }
        }

        // 🔥 WEBRTC LOGIC INTEGRATED
        function connectWebSocket() {
            const url = document.getElementById('wsUrl').value;
            const roomId = document.getElementById('targetId').value.trim();
            
            if (!roomId) {
                log('Please enter a Target Device ID (Room ID).', 'error');
                return;
            }

            log(`Connecting to signaling server...`, 'info');
            btnConnect.innerHTML = '<i class="fa-solid fa-circle-notch fa-spin"></i> Connecting...';

            ws = new WebSocket(url);

            ws.onopen = () => {
                log('Connected to server. Joining room...', 'info');
                ws.send(JSON.stringify({ type: "join", roomId: roomId }));
                updateStatus(true);
            };

            ws.onmessage = async (event) => {
                try {
                    const data = JSON.parse(event.data);
                    
                    if (data.type === "offer") {
                        log('Received Video Offer from Target.', 'info');
                        await handleOffer(data.sdp, roomId);
                    } else if (data.type === "candidate") {
                        if (pc) {
                            await pc.addIceCandidate(new RTCIceCandidate({
                                candidate: data.candidate,
                                sdpMid: data.id,
                                sdpMLineIndex: data.label
                            }));
                        }
                    } else if (data.type === "stop_stream") {
                        log('Target stopped the stream.', 'warn');
                        remoteVideo.style.display = 'none';
                        remoteVideo.srcObject = null;
                        waitingText.style.display = 'flex';
                    }
                } catch (e) {
                    console.error(e);
                }
            };

            ws.onclose = () => {
                log('Connection to server lost.', 'warn');
                updateStatus(false);
            };
        }

        async function handleOffer(sdp, roomId) {
            const config = { iceServers: [{ urls: "stun:stun.l.google.com:19302" }] };
            pc = new RTCPeerConnection(config);

            // Jab video aani shuru ho jaye
            pc.ontrack = (event) => {
                remoteVideo.srcObject = event.streams[0];
                waitingText.style.display = 'none';
                remoteVideo.style.display = 'block';
                log('Live Stream Started!', 'success');
            };

            // Ice candidate forward karna
            pc.onicecandidate = (event) => {
                if (event.candidate && ws) {
                    ws.send(JSON.stringify({
                        type: "candidate",
                        roomId: roomId,
                        candidate: event.candidate.candidate,
                        id: event.candidate.sdpMid,
                        label: event.candidate.sdpMLineIndex
                    }));
                }
            };

            await pc.setRemoteDescription(new RTCSessionDescription({ type: "offer", sdp: sdp }));
            const answer = await pc.createAnswer();
            await pc.setLocalDescription(answer);

            // Target ko answer bhej do
            ws.send(JSON.stringify({
                type: "answer",
                roomId: roomId,
                sdp: answer.sdp
            }));
        }

        function stopScreen() {
            if (ws && isConnected) {
                const roomId = document.getElementById('targetId').value.trim();
                ws.send(JSON.stringify({ type: "stop_stream", roomId: roomId }));
                log('Stop command sent.', 'info');
                
                remoteVideo.style.display = 'none';
                remoteVideo.srcObject = null;
                waitingText.style.display = 'flex';
            }
        }

        function toggleFullscreen() {
            const container = document.getElementById('videoContainer');
            if (!document.fullscreenElement) {
                if (container.requestFullscreen) container.requestFullscreen();
            } else {
                if (document.exitFullscreen) document.exitFullscreen();
            }
        }
    </script>
</body>
</html>
